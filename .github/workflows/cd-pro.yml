name: cd-pro

on:
  workflow_dispatch:

env:
  PROJECT_NAME: eudistack
  FROM_ENV: stg
  ENVIRONMENT: pro
  APP_NAME: issuer-core
  REGION_CODE: ew1

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  
  cd:
    name: Deploy to Production
    runs-on: ubuntu-latest
   
    steps:
      - name: Configure AWS credentials (${{ env.FROM_ENV }})
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STG }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STG }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR (${{ env.FROM_ENV }})
        id: ecr-stg
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull image from ${{ env.FROM_ENV }} ECR
        env:
          ECR_REGISTRY_STG: ${{ steps.ecr-stg.outputs.registry }}
          ECR_REPOSITORY_STG: ${{ env.PROJECT_NAME }}-${{ env.FROM_ENV }}-ecr-${{ env.REGION_CODE }}-${{ env.APP_NAME }}
        run: |
          set -euo pipefail
          
          STG_IMAGE="${ECR_REGISTRY_STG}/${ECR_REPOSITORY_STG}:latest"
          echo "Pulling staging image: ${STG_IMAGE}"
          docker pull "${STG_IMAGE}"

      - name: Configure AWS credentials (Production)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PRO }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PRO }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR (Production)
        id: ecr-pro
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag & Push to Production ECR
        env:
          ECR_REGISTRY_STG: ${{ steps.ecr-stg.outputs.registry }}
          ECR_REGISTRY_PRO: ${{ steps.ecr-pro.outputs.registry }}
          ECR_REPOSITORY_STG: ${{ env.PROJECT_NAME }}-${{ env.FROM_ENV }}-ecr-${{ env.REGION_CODE }}-${{ env.APP_NAME }}
          ECR_REPOSITORY_PRO: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-ecr-${{ env.REGION_CODE }}-${{ env.APP_NAME }}
        run: |
          set -euo pipefail
          
          STG_IMAGE="${ECR_REGISTRY_STG}/${ECR_REPOSITORY_STG}:latest"
          PRO_IMAGE="${ECR_REGISTRY_PRO}/${ECR_REPOSITORY_PRO}:${{ env.ENVIRONMENT }}"
          PRO_LATEST="${ECR_REGISTRY_PRO}/${ECR_REPOSITORY_PRO}:latest"
          
          echo "Tagging for production..."
          docker tag "${STG_IMAGE}" "${PRO_IMAGE}"
          docker tag "${STG_IMAGE}" "${PRO_LATEST}"
          
          echo "Pushing to production ECR..."
          docker push "${PRO_IMAGE}"
          docker push "${PRO_LATEST}"
          
          echo "### 📦 Image promoted" >> $GITHUB_STEP_SUMMARY
          echo "- **From:** ${STG_IMAGE}" >> $GITHUB_STEP_SUMMARY
          echo "- **To:** ${PRO_IMAGE}" >> $GITHUB_STEP_SUMMARY

      - name: Force new ECS deployment
        run: |
          set -euo pipefail
          CLUSTER="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-ecs-${{ env.REGION_CODE }}"
          SERVICE="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-ecs-${{ env.REGION_CODE }}-${{ env.APP_NAME }}-service"

          echo "Deploying ${SERVICE} on cluster ${CLUSTER}..."
          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "${SERVICE}" \
            --force-new-deployment \
            --region "${{ secrets.AWS_REGION }}" \
            --no-cli-pager

          echo "### 🚀 Deployment triggered" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster:** ${CLUSTER}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${SERVICE}" >> $GITHUB_STEP_SUMMARY

      - name: Wait for deployment stability
        run: |
          set -euo pipefail
          CLUSTER="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-ecs-${{ env.REGION_CODE }}"
          SERVICE="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-ecs-${{ env.REGION_CODE }}-${{ env.APP_NAME }}-service"

          echo "Waiting for service stability (timeout: 10 min)..."
          aws ecs wait services-stable \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}" \
            --region "${{ secrets.AWS_REGION }}" \
            --no-cli-pager || {
              echo "::warning::Service did not stabilize within timeout"
              exit 1
            }

          echo "### ✅ Deployment successful" >> $GITHUB_STEP_SUMMARY   
