name: ci-cd-stg

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

env:
  PROJECT_NAME: eudistack
  ENVIRONMENT: stg
  APP_NAME: issuer-core
  REGION_CODE: ew1

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  ci:
    name: Build, Push & Tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STG }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STG }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-ecr-${{ env.REGION_CODE }}-${{ env.APP_NAME }}
        run: |
          set -euo pipefail

          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${{ env.ENVIRONMENT }}"
          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${{ env.ENVIRONMENT }}"
          ECR_LATEST="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          docker build --build-arg SKIP_TESTS=true -t "${ECR_IMAGE}" .
          docker tag "${ECR_IMAGE}" "${ECR_LATEST}"

          docker push "${ECR_IMAGE}"
          docker push "${ECR_LATEST}"
  cd:
    name: Deploy to Staging
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STG }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STG }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          set -euo pipefail
          CLUSTER="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-ecs-${{ env.REGION_CODE }}"
          SERVICE="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-ecs-${{ env.REGION_CODE }}-${{ env.APP_NAME }}-service"

          echo "Deploying ${SERVICE} on cluster ${CLUSTER}..."
          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "${SERVICE}" \
            --force-new-deployment \
            --region "${{ secrets.AWS_REGION }}" \
            --no-cli-pager

          echo "### 🚀 Deployment triggered" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster:** ${CLUSTER}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${SERVICE}" >> $GITHUB_STEP_SUMMARY

      - name: Wait for deployment stability
        run: |
          set -euo pipefail
          CLUSTER="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-ecs-${{ env.REGION_CODE }}"
          SERVICE="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-ecs-${{ env.REGION_CODE }}-${{ env.APP_NAME }}-service"

          echo "Waiting for service stability (timeout: 10 min)..."
          aws ecs wait services-stable \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}" \
            --region "${{ secrets.AWS_REGION }}" \
            --no-cli-pager

          echo "### ✅ Deployment successful" >> $GITHUB_STEP_SUMMARY      


