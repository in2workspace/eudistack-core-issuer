name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  release:
    name: Build, Push & Tag
    runs-on: ubuntu-latest
    environment: stg
    env:
      ENVIRONMENT: stg
      APP_NAME: issuer-core
      REGION_CODE: ew1
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Get Project Metadata
        run: |
          echo "PROJECT_NAME=$(./gradlew -q properties | grep '^name:' | awk '{print $2}')" >> $GITHUB_ENV
          echo "VERSION=$(./gradlew -q properties | grep '^version:' | awk '{print $2}')" >> $GITHUB_ENV

      - name: Check if release already exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_EXISTS=$(gh release view "v${{ env.VERSION }}" --json tagName --jq '.tagName' 2>/dev/null || echo "")
          if [ "$TAG_EXISTS" = "v${{ env.VERSION }}" ]; then
            echo "::notice::Release v${{ env.VERSION }} already exists — skipping release."
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
          fi

      - name: Login to Docker Hub
        if: env.SKIP_RELEASE != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Configure AWS credentials
        if: env.SKIP_RELEASE != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STG }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STG }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: env.SKIP_RELEASE != 'true'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        if: env.SKIP_RELEASE != 'true'
        env:
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
          VERSION: ${{ env.VERSION }}
          DOCKERHUB_ORG: ${{ secrets.DOCKERHUB_ORG }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: eudistack-${{ env.ENVIRONMENT }}-ecr-${{ env.REGION_CODE }}-${{ env.APP_NAME }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"

          DH_IMAGE="docker.io/${DOCKERHUB_ORG}/${PROJECT_NAME}:${TAG}"
          DH_LATEST="docker.io/${DOCKERHUB_ORG}/${PROJECT_NAME}:latest"

          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${TAG}"
          ECR_LATEST="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          docker build --build-arg SKIP_TESTS=true -t "${DH_IMAGE}" .
          docker tag "${DH_IMAGE}" "${DH_LATEST}"
          docker tag "${DH_IMAGE}" "${ECR_IMAGE}"
          docker tag "${DH_IMAGE}" "${ECR_LATEST}"

          docker push "${DH_IMAGE}"
          docker push "${DH_LATEST}"
          docker push "${ECR_IMAGE}"
          docker push "${ECR_LATEST}"

      - name: Create GitHub Release
        if: env.SKIP_RELEASE != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ env.VERSION }}" \
            --title "v${{ env.VERSION }}" \
            --notes "Release of version v${{ env.VERSION }}" \
            --target main

      - name: Trigger deploy to STG
        if: env.SKIP_RELEASE != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml -f environment=stg
          echo "### Deploy triggered" >> $GITHUB_STEP_SUMMARY
