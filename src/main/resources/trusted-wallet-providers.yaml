# Trusted Wallet Providers List
# Analogous to the European LOTL for wallet attestation providers.
# Each entry represents a Wallet Provider whose WIA (Wallet Instance Attestation)
# this issuer will accept when using attest_jwt_client_auth.
#
# In production, this file should be externalized and regularly updated
# from the official European Trusted List once available.

trustedWalletProviders:
  - id: "dev-wallet-provider"
    name: "Development Wallet Provider"
    publicKeyPem: |
      -----BEGIN PUBLIC KEY-----
      MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAE...
      -----END PUBLIC KEY-----
