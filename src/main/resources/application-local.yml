# ---------------------------------------------------------------------------
# Profile: local
#
# Activate:  ./gradlew bootRun --args='--spring.profiles.active=local'
#            or set SPRING_PROFILES_ACTIVE=local in IntelliJ run config
#
# Requires:  cd docker && docker compose up -d postgres
# Mail:      Uses Resend SMTP. Set RESEND_API_KEY env var.
# ---------------------------------------------------------------------------

spring:
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/issuer
    username: issuer
    password: issuer
  flyway:
    url: jdbc:postgresql://localhost:5432/issuer
    default-schema: issuer
  mail:
    host: smtp.resend.com
    port: 465
    username: resend
    password: ${RESEND_API_KEY}
    properties.mail.smtp:
      auth: true
      starttls.enable: false
      ssl.enable: true
      ssl.trust: smtp.resend.com

logging:
  level:
    es.in2.issuer: DEBUG

app:
  url: http://localhost:8080
  issuer-frontend-url: http://localhost:4200
  trust-framework-url: https://trust-framework.example.com
  knowledge-base:
    upload-certification-guide-url: https://example.com/guide
    wallet-guide-url: https://example.com/wallet
  verifier-url: https://verifier.example.com
  wallet-url: https://wallet.example.com
  config-source: yaml
  default-lang: en
  admin-organization-id: VATES-B60645900
  sys-tenant: SYSTEM

default-signer:
  common-name: "Local Dev Issuer"
  country: "ES"
  email: "dev@example.com"
  organization-identifier: "VATES-B60645900"
  organization: "Dev Organization"
  serial-number: "B60645900"

issuer-identity:
  credential-subject-did-key: "did:key:z6MkqmaCT2JqdUtLeKah7tEVfNXtDXtQyj4yxEgV11Y5CqUa"
  jwt-credential: ""
  crypto:
    private-key: ""

signing:
  runtime:
    enabled: true
    controller-enabled: true

cors:
  default-allowed-origins: http://localhost:4200
  external-allowed-origins: http://localhost:4200
