# =============================================================================
# Issuer Core Backend — application.yml
#
# All values are injectable via environment variables (Spring relaxed binding).
# Defaults are set for local development (localhost, AWS SES SMTP, etc.).
# In production, override via Docker Compose env, Kubernetes ConfigMap, or .env.
# =============================================================================

spring:
  application:
    name: in2-issuer-backend
  main:
    web-application-type: reactive
  codec:
    max-in-memory-size: ${SPRING_CODEC_MAX_IN_MEMORY_SIZE:256KB}
  reactor:
    context-propagation: auto
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/issuer}
    username: ${SPRING_R2DBC_USERNAME}
    password: ${SPRING_R2DBC_PASSWORD}
  flyway:
    url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/issuer}
    locations: classpath:db/migration
    default-schema: ${SPRING_FLYWAY_DEFAULT_SCHEMA:issuer}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties.mail.smtp:
      auth: ${SMTP_AUTH:true}
      starttls.enable: ${SMTP_STARTTLS:true}
      ssl.enable: ${SMTP_SSL_ENABLE:false}
      ssl.trust: ${SMTP_SSL_TRUST:}
  messages:
    basename: messages/messages

# Logging
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    org.springframework.security: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}
    es.in2.issuer: ${LOGGING_LEVEL_ES_IN2_ISSUER:INFO}

# Actuator & Observability
management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health, prometheus
      base-path: /
      path-mapping:
        health: health
        prometheus: prometheus
  endpoint:
    health:
      enabled: true
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:when-authorized}
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}
    propagation:
      type: w3c
  observations:
    key-values:
      service: ${spring.application.name}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /springdoc/api-docs
  swagger-ui:
    path: /springdoc/swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

server:
  port: ${SERVER_PORT:8080}

openapi:
  server:
    url: ${OPENAPI_SERVER_URL:https://localhost:8080}
    description: ${OPENAPI_SERVER_DESCRIPTION:Server Description}
  info:
    title: "Issuer API"
    version: "0.0.1-SNAPSHOT"
    description: "Issuer API Web Server"
    termsOfService: "https://example.com/terms-of-service"
    license:
      name: "Apache 2.0"
      url: "https://www.apache.org/licenses/LICENSE-2.0.html"
    contact:
      email: "test@example.com"
      name: "Test Name"
      url: "https://example.com"

# Credential profiles
credential:
  profiles:
    path: ${CREDENTIAL_PROFILES_PATH:classpath:credentials/profiles}

# Application
app:
  url: ${APP_URL:http://localhost:8080}
  internal-url: ${APP_INTERNAL_URL:}
  issuer-frontend-url: ${APP_ISSUER_FRONTEND_URL:http://localhost:4200}
  knowledge-base:
    upload-certification-guide-url: ${APP_KNOWLEDGE_BASE_UPLOAD_CERTIFICATION_GUIDE_URL:https://example.com/guide}
    wallet-guide-url: ${APP_KNOWLEDGE_BASE_WALLET_GUIDE_URL:https://example.com/wallet}
  verifier-url: ${APP_VERIFIER_URL:https://verifier.example.com}
  wallet-url: ${APP_WALLET_URL:https://wallet.example.com}
  mail-from: ${APP_MAIL_FROM:noreply@mail-stg.altia.eudistack.net}
  default-lang: ${APP_DEFAULT_LANG:en}
  admin-organization-id: ${APP_ADMIN_ORGANIZATION_ID:VATES-B60645900}
  sys-tenant: ${APP_SYS_TENANT:SYSTEM}
  management-token:
    org-id-json-path: ${APP_MGMT_TOKEN_ORG_ID_PATH:vc.credentialSubject.mandate.mandator.organizationIdentifier}
    admin-power-function: ${APP_MGMT_TOKEN_ADMIN_POWER_FUNCTION:Onboarding}
    admin-power-action: ${APP_MGMT_TOKEN_ADMIN_POWER_ACTION:Execute}

# Issuer Identity
issuer-identity:
  credential-subject-did-key: ${ISSUER_IDENTITY_CREDENTIAL_SUBJECT_DID_KEY:did:key:z6MkqmaCT2JqdUtLeKah7tEVfNXtDXtQyj4yxEgV11Y5CqUa}
  jwt-credential: ${ISSUER_IDENTITY_JWT_CREDENTIAL:}
  crypto:
    private-key: ${ISSUER_IDENTITY_CRYPTO_PRIVATE_KEY:}

# Signing
signing:
  runtime:
    enabled: ${SIGNING_RUNTIME_ENABLED:true}
    controller-enabled: ${SIGNING_RUNTIME_CONTROLLER_ENABLED:true}
  certificate:
    cert-path: ${SIGNING_CERTIFICATE_CERT_PATH:}
    key-path: ${SIGNING_CERTIFICATE_KEY_PATH:}

# OID4VCI Profile (authorization_code flow configuration)
oid4vci:
  profile:
    grants-supported:
      - urn:ietf:params:oauth:grant-type:pre-authorized_code
      - authorization_code
    authorization-code:
      require-par: ${OID4VCI_REQUIRE_PAR:true}
      require-pkce: ${OID4VCI_REQUIRE_PKCE:true}
      pkce-methods:
        - S256
      require-dpop: ${OID4VCI_REQUIRE_DPOP:true}
      dpop-signing-algs:
        - ES256
      client-auth-method: ${OID4VCI_CLIENT_AUTH_METHOD:attest_jwt_client_auth}
      require-nonce: ${OID4VCI_REQUIRE_NONCE:true}

# Trusted Wallet Providers
wallet-provider-trust:
  providers-path: ${WALLET_PROVIDER_TRUST_PATH:classpath:trusted-wallet-providers.yaml}

# Procedure lifecycle
procedure:
  draft-max-age-days: ${PROCEDURE_DRAFT_MAX_AGE_DAYS:30}
  cleanup-cron: ${PROCEDURE_CLEANUP_CRON:0 0 2 * * *}

# CORS
cors:
  default-allowed-origins: ${CORS_DEFAULT_ALLOWED_ORIGINS:http://localhost:4200}
  external-allowed-origins: ${CORS_EXTERNAL_ALLOWED_ORIGINS:http://localhost:4200}
