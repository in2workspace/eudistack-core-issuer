# =============================================================================
# Issuer Core Backend — application.yml
#
# All values are injectable via environment variables (Spring relaxed binding).
# Defaults are set for local development (localhost, Resend SMTP, etc.).
# In production, override via Docker Compose env, Kubernetes ConfigMap, or .env.
# =============================================================================

spring:
  application:
    name: in2-issuer-backend
  main:
    web-application-type: reactive
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/issuer}
    username: ${SPRING_R2DBC_USERNAME:issuer}
    password: ${SPRING_R2DBC_PASSWORD:issuer}
  flyway:
    url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/issuer}
    locations: classpath:db/migration
    default-schema: ${SPRING_FLYWAY_DEFAULT_SCHEMA:issuer}
  mail:
    host: ${SPRING_MAIL_HOST:smtp.resend.com}
    port: ${SPRING_MAIL_PORT:465}
    username: ${SPRING_MAIL_USERNAME:resend}
    password: ${SPRING_MAIL_PASSWORD:${RESEND_API_KEY:}}
    properties.mail.smtp:
      auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
      starttls.enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}
      ssl.enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE:true}
      ssl.trust: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST:smtp.resend.com}
  messages:
    basename: messages/messages

# Logging
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    org.springframework.security: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}
    es.in2.issuer: ${LOGGING_LEVEL_ES_IN2_ISSUER:DEBUG}

# Actuator
management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health, prometheus
      base-path: /
      path-mapping:
        health: health
        prometheus: prometheus
  endpoint:
    health:
      enabled: true
      show-details: always
    prometheus:
      enabled: true

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /springdoc/api-docs
  swagger-ui:
    path: /springdoc/swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

server:
  port: ${SERVER_PORT:8080}

openapi:
  server:
    url: ${OPENAPI_SERVER_URL:https://localhost:8080}
    description: ${OPENAPI_SERVER_DESCRIPTION:Server Description}
  info:
    title: "Issuer API"
    version: "0.0.1-SNAPSHOT"
    description: "Issuer API Web Server"
    termsOfService: "https://example.com/terms-of-service"
    license:
      name: "Apache 2.0"
      url: "https://www.apache.org/licenses/LICENSE-2.0.html"
    contact:
      email: "test@example.com"
      name: "Test Name"
      url: "https://example.com"

# Application
app:
  url: ${APP_URL:http://localhost:8080}
  issuer-frontend-url: ${APP_ISSUER_FRONTEND_URL:http://localhost:4200}
  trust-framework-url: ${APP_TRUST_FRAMEWORK_URL:https://trust-framework.example.com}
  knowledge-base:
    upload-certification-guide-url: ${APP_KNOWLEDGE_BASE_UPLOAD_CERTIFICATION_GUIDE_URL:https://example.com/guide}
    wallet-guide-url: ${APP_KNOWLEDGE_BASE_WALLET_GUIDE_URL:https://example.com/wallet}
  verifier-url: ${APP_VERIFIER_URL:https://verifier.example.com}
  wallet-url: ${APP_WALLET_URL:https://wallet.example.com}
  mail-from: ${APP_MAIL_FROM:onboarding@resend.dev}
  config-source: ${APP_CONFIG_SOURCE:yaml}
  default-lang: ${APP_DEFAULT_LANG:en}
  admin-organization-id: ${APP_ADMIN_ORGANIZATION_ID:VATES-B60645900}
  sys-tenant: ${APP_SYS_TENANT:SYSTEM}

# Azure (only used when config-source=azure)
azure:
  endpoint: ${AZURE_ENDPOINT:https://myappconfig.azconfig.io}
  label:
    global: ${AZURE_LABEL_GLOBAL:in2-issuer-backend}

# Default Signer
default-signer:
  common-name: ${DEFAULT_SIGNER_COMMON_NAME:Local Dev Issuer}
  country: ${DEFAULT_SIGNER_COUNTRY:ES}
  email: ${DEFAULT_SIGNER_EMAIL:dev@example.com}
  organization-identifier: ${DEFAULT_SIGNER_ORGANIZATION_IDENTIFIER:VATES-B60645900}
  organization: ${DEFAULT_SIGNER_ORGANIZATION:Dev Organization}
  serial-number: ${DEFAULT_SIGNER_SERIAL_NUMBER:B60645900}

# Issuer Identity
issuer-identity:
  credential-subject-did-key: ${ISSUER_IDENTITY_CREDENTIAL_SUBJECT_DID_KEY:did:key:z6MkqmaCT2JqdUtLeKah7tEVfNXtDXtQyj4yxEgV11Y5CqUa}
  jwt-credential: ${ISSUER_IDENTITY_JWT_CREDENTIAL:}
  crypto:
    private-key: ${ISSUER_IDENTITY_CRYPTO_PRIVATE_KEY:}

# Signing
signing:
  runtime:
    enabled: ${SIGNING_RUNTIME_ENABLED:true}
    controller-enabled: ${SIGNING_RUNTIME_CONTROLLER_ENABLED:true}
  certificate:
    cert-path: ${SIGNING_CERTIFICATE_CERT_PATH:}
    key-path: ${SIGNING_CERTIFICATE_KEY_PATH:}

# CORS
cors:
  default-allowed-origins: ${CORS_DEFAULT_ALLOWED_ORIGINS:http://localhost:4200}
  external-allowed-origins: ${CORS_EXTERNAL_ALLOWED_ORIGINS:http://localhost:4200}
