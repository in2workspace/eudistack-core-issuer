# =============================================================================
# Issuer Core Backend — application.yml
#
# All values are injectable via environment variables (Spring relaxed binding).
# Defaults are set for local development (localhost, AWS SES SMTP, etc.).
# In production, override via Docker Compose env, Kubernetes ConfigMap, or .env.
# =============================================================================

spring:
  application:
    name: in2-issuer-backend
  main:
    web-application-type: reactive
  codec:
    max-in-memory-size: ${SPRING_CODEC_MAX_IN_MEMORY_SIZE:256KB}
  reactor:
    context-propagation: auto
  # Mounts all WebFlux handlers under this prefix AND is read by
  # IssuerBaseUrlWebFilter to build public URLs (single source of truth).
  # AWS ALB + CloudFront do not inject X-Forwarded-Prefix, so we rely on
  # this property instead. Override via APP_CONTEXT_PATH.
  webflux:
    base-path: ${APP_CONTEXT_PATH:/issuer}
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/issuer}
    username: ${SPRING_R2DBC_USERNAME}
    password: ${SPRING_R2DBC_PASSWORD}
  flyway:
    # Disabled: TenantSchemaFlywayMigrator runs migrations for `public` + all
    # tenant schemas using R2DBC credentials. Spring Boot's auto-configured
    # flywayInitializer would need its own JDBC user/password and would also
    # double-migrate `public`.
    enabled: false
    url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/issuer}
    locations: classpath:db/migration
    default-schema: ${SPRING_FLYWAY_DEFAULT_SCHEMA:public}
    baseline-on-migrate: true
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties.mail.smtp:
      auth: ${SMTP_AUTH:true}
      starttls.enable: ${SMTP_STARTTLS:true}
      ssl.enable: ${SMTP_SSL_ENABLE:false}
      ssl.trust: ${SMTP_SSL_TRUST:}
  messages:
    basename: messages/messages

# Logging
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-},%X{tenantDomain:-}]"
  level:
    org.springframework.security: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}
    es.in2.issuer: ${LOGGING_LEVEL_ES_IN2_ISSUER:INFO}

# Actuator & Observability
management:
  endpoints:
    access:
      default: none
    web:
      exposure:
        include: health, prometheus
      base-path: /
      path-mapping:
        health: health
        prometheus: prometheus
  endpoint:
    health:
      access: unrestricted
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:when-authorized}
      show-components: ${MANAGEMENT_HEALTH_SHOW_COMPONENTS:when-authorized}
      probes:
        enabled: true
      # SMTP/verifier are informational dependencies: their failure should not
      # take the issuer out of the ALB pool, but they remain visible in /health.
      group:
        readiness:
          include: readinessState
        liveness:
          include: livenessState
    prometheus:
      access: unrestricted
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    # Local dev → true (Spring exports to Jaeger); AWS → false (ADOT agent handles X-Ray)
    enabled: ${MANAGEMENT_TRACING_ENABLED:true}
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}
    propagation:
      type: w3c
  observations:
    key-values:
      service: ${spring.application.name}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /springdoc/api-docs
  swagger-ui:
    path: /springdoc/swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

server:
  port: ${SERVER_PORT:8080}
  # Use 'framework' behind a trusted proxy that strips client-supplied Forwarded/X-Forwarded-* headers.
  # Default 'none' when running without proxy (direct access).
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:none}

# Credential profiles
credential:
  profiles:
    path: ${CREDENTIAL_PROFILES_PATH:classpath:credentials/profiles}

# Application
app:
  url: ${APP_URL:http://localhost:8080}
  internal-url: ${APP_INTERNAL_URL:}
  verifier-url: ${APP_VERIFIER_URL:https://verifier.example.com}
  verifier-internal-url: ${APP_VERIFIER_INTERNAL_URL:}
  cors:
    origins-path: ${APP_CORS_ORIGINS_PATH:}
  # mail-from removed — now per-tenant via tenant_config.issuer.mail_from
  default-lang: ${APP_DEFAULT_LANG:en}
  sys-tenant: ${APP_SYS_TENANT:SYSTEM}
  management-token:
    org-id-json-path: ${APP_MGMT_TOKEN_ORG_ID_PATH:mandator.organizationIdentifier}
    admin-power-function: ${APP_MGMT_TOKEN_ADMIN_POWER_FUNCTION:Onboarding}
    admin-power-action: ${APP_MGMT_TOKEN_ADMIN_POWER_ACTION:Execute}

# Issuer Identity
issuer-identity:
  crypto:
    private-key: ${ISSUER_IDENTITY_CRYPTO_PRIVATE_KEY:}

# Signing configuration is now 100% per-tenant via tenant_signing_config in the DB
# (see seed-tenants[.stg].sql). No global fallback.

# OID4VCI Profile (authorization_code flow configuration)
oid4vci:
  profile:
    grants-supported:
      - urn:ietf:params:oauth:grant-type:pre-authorized_code
      - authorization_code
    authorization-code:
      require-par: ${OID4VCI_REQUIRE_PAR:true}
      require-pkce: ${OID4VCI_REQUIRE_PKCE:true}
      pkce-methods:
        - S256
      require-dpop: ${OID4VCI_REQUIRE_DPOP:true}
      dpop-signing-algs:
        - ES256
      client-auth-method: ${OID4VCI_CLIENT_AUTH_METHOD:attest_jwt_client_auth}
      require-nonce: ${OID4VCI_REQUIRE_NONCE:true}

# Trusted Wallet Providers
wallet-provider-trust:
  providers-path: ${WALLET_PROVIDER_TRUST_PATH:classpath:trusted-wallet-providers.yaml}

# Issuance lifecycle
issuance:
  draft-max-age-days: ${ISSUANCE_DRAFT_MAX_AGE_DAYS:30}
  cleanup-cron: ${ISSUANCE_CLEANUP_CRON:0 0 2 * * *}
  delivery-timeout-minutes: ${ISSUANCE_DELIVERY_TIMEOUT_MINUTES:60}
  delivery-timeout-cron: ${ISSUANCE_DELIVERY_TIMEOUT_CRON:0 */5 * * * ?}
