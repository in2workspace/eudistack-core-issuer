<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{email.tx-code.header}">Your Activation Code</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #f4f5f7;">
    <tr>
        <td align="center" style="padding: 24px 0;">
            <table width="640" cellspacing="0" cellpadding="0" border="0" style="width: 100%; max-width: 640px; background-color: #ffffff; border-radius: 8px; overflow: hidden;">
                <!-- HEADER -->
                <tr>
                    <td align="center" style="background-color: #2D58A7; padding: 20px; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size: 24px; font-weight: bold;" th:text="#{email.tx-code.header}">
                        Your Activation Code
                    </td>
                </tr>
                <!-- CONTENT -->
                <tr>
                    <td align="center" style="padding: 40px 30px 30px 30px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size: 16px; color: #333333;">
                        <p style="margin: 0 0 16px 0;" th:text="#{email.tx-code.greeting}">Hello,</p>
                        <p style="margin: 0 0 24px 0;" th:text="#{email.tx-code.body}">Your activation code is:</p>

                        <!-- ACTIVATION CODE -->
                        <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center">
                            <tr>
                                <td align="center" style="padding: 16px 32px; background-color: #f4f5f7; border-radius: 8px; border: 1px solid #e0e0e0;">
                                    <span style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size: 32px; font-weight: bold; letter-spacing: 6px; color: #2D58A7;" th:text="${txCode}">1234</span>
                                </td>
                            </tr>
                        </table>

                        <p style="margin: 24px 0 0 0; font-size: 14px; color: #666666;" th:text="#{email.tx-code.hint}">Please enter this activation code in your Wallet App.</p>
                    </td>
                </tr>

                <!-- FOOTER -->
                <tr>
                    <td align="center" style="padding: 20px 30px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; color: #999999; border-top: 1px solid #e0e0e0;">
                        <p style="margin: 0;" th:text="#{email.tx-code.footer}">If you did not request this code, please ignore this email.</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
