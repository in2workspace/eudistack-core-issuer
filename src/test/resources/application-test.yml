# Test profile overrides — base DB credentials (dummies for unit/slice tests).
# TenantSchemaFlywayMigrator handles missing DB gracefully (try/catch → 0 tenants).
# Note: integration tests that use real R2DBC repos (e.g. KmsKeyMigrationRepositoryPort,
# R2dbcMigrationAuditRepository) override these values via @DynamicPropertySource pointing
# to a Testcontainers PostgreSQL instance. In those tests, DB connections ARE established.
spring:
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/test
    username: test
    password: test
  webflux:
    # Flat base-path to keep test URIs simple (avoids /issuer prefix in assertions)
    base-path: /
  flyway:
    url: jdbc:postgresql://localhost:5432/test

